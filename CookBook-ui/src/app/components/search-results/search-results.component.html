<app-header></app-header>
<main class="container mx-auto px-4 py-10 md:py-14 min-h-[60vh]">
  <h1 class="font-display text-3xl md:text-4xl font-bold mb-3 text-foreground tracking-tight">
    Suchergebnisse für &bdquo;{{ query }}&ldquo;
  </h1>

  <!-- Loading -->
  <ng-container *ngIf="isLoading">
    <p class="text-muted-foreground mb-8">Suche läuft...</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-7">
      <div *ngFor="let s of [1,2,3]" class="rounded-2xl overflow-hidden border border-border/60 bg-card animate-shimmer">
        <div class="h-48 bg-muted"></div>
        <div class="p-5 space-y-3">
          <div class="h-4 bg-muted rounded-lg w-1/3"></div>
          <div class="h-6 bg-muted rounded-lg w-3/4"></div>
          <div class="h-4 bg-muted rounded-lg w-full"></div>
          <div class="h-4 bg-muted rounded-lg w-2/3"></div>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- Results -->
  <ng-container *ngIf="!isLoading">
    <p class="text-muted-foreground mb-10 text-sm tracking-wide">{{ recipes.length }} Rezepte gefunden</p>

    <!-- Empty state -->
    <div *ngIf="recipes.length === 0" class="text-center py-20 animate-fade-in">
      <p class="text-2xl font-bold text-foreground mb-3 font-display tracking-tight">Keine Rezepte gefunden</p>
      <p class="text-muted-foreground leading-relaxed">Keine Rezepte für &bdquo;{{ query }}&ldquo; gefunden. Versuche einen anderen Suchbegriff.</p>
    </div>

    <!-- Recipe grid -->
    <div *ngIf="recipes.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-7">
      <div *ngFor="let recipe of recipes" class="animate-fade-in-up">
        <app-recipe-card [recipe]="recipe"></app-recipe-card>
      </div>
    </div>
  </ng-container>
</main>
<app-footer></app-footer>
