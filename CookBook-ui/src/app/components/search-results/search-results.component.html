<app-header></app-header>
<main class="container mx-auto px-4 py-8 min-h-[60vh]">
  <h1 class="font-display text-3xl font-bold mb-2 text-foreground">
    Suchergebnisse für &bdquo;{{ query }}&ldquo;
  </h1>

  <!-- Loading -->
  <ng-container *ngIf="isLoading">
    <p class="text-muted-foreground mb-8">Suche läuft...</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let s of [1,2,3]" class="rounded-2xl overflow-hidden border border-border bg-card animate-pulse">
        <div class="h-48 bg-muted"></div>
        <div class="p-4 space-y-3">
          <div class="h-4 bg-muted rounded w-1/3"></div>
          <div class="h-6 bg-muted rounded w-3/4"></div>
          <div class="h-4 bg-muted rounded w-full"></div>
          <div class="h-4 bg-muted rounded w-2/3"></div>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- Results -->
  <ng-container *ngIf="!isLoading">
    <p class="text-muted-foreground mb-8">{{ recipes.length }} Rezepte gefunden</p>

    <!-- Empty state -->
    <div *ngIf="recipes.length === 0" class="text-center py-16">
      <p class="text-2xl font-semibold text-foreground mb-2">Keine Rezepte gefunden</p>
      <p class="text-muted-foreground">Keine Rezepte für &bdquo;{{ query }}&ldquo; gefunden. Versuche einen anderen Suchbegriff.</p>
    </div>

    <!-- Recipe grid -->
    <div *ngIf="recipes.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let recipe of recipes" class="animate-fade-in">
        <app-recipe-card [recipe]="recipe"></app-recipe-card>
      </div>
    </div>
  </ng-container>
</main>
<app-footer></app-footer>
