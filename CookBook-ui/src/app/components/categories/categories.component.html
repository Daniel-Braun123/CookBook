<div class="min-h-screen bg-background">
  <!-- Hero Section -->
  <section class="hero-gradient py-16 md:py-24 relative">
    <!-- Back Button -->
    <a 
      [routerLink]="['/']"
      class="absolute top-6 left-4 md:left-8 flex items-center gap-2 text-white/90 hover:text-white transition-colors group"
    >
      <svg class="h-6 w-6 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      <span class="hidden md:inline font-medium">Zurück</span>
    </a>
    
    <div class="container mx-auto px-4 text-center">
      <h1 class="font-display text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-4">
        Rezept-Kategorien
      </h1>
      <p class="text-white/90 text-lg md:text-xl max-w-2xl mx-auto">
        Entdecke unsere vielfältigen Rezeptkategorien
      </p>
    </div>
  </section>

  <!-- Categories Grid -->
  <section class="py-12 md:py-16">
    <div class="container mx-auto px-4">
      <!-- Loading State -->
      <div *ngIf="isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="animate-pulse">
          <div class="bg-card rounded-xl p-6 border border-border h-48">
            <div class="w-16 h-16 bg-muted rounded-full mb-4"></div>
            <div class="h-6 bg-muted rounded w-3/4 mb-3"></div>
            <div class="h-4 bg-muted rounded w-full mb-2"></div>
            <div class="h-4 bg-muted rounded w-5/6"></div>
          </div>
        </div>
      </div>

      <!-- Categories -->
      <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <article
          *ngFor="let category of categories; let i = index"
          (click)="navigateToCategory(category.name)"
          class="bg-card rounded-xl p-6 border border-border transition-all duration-300 cursor-pointer group hover:shadow-xl hover:-translate-y-1 animate-fade-in"
          [style.animation-delay]="i * 0.1 + 's'"
        >
          <!-- Icon -->
          <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4 text-4xl transition-transform group-hover:scale-110">
            {{ category.icon }}
          </div>

          <!-- Title -->
          <h2 class="font-display text-2xl font-bold text-foreground mb-2 group-hover:text-primary transition-colors">
            {{ category.name }}
          </h2>

          <!-- Recipe Count -->
          <p class="text-sm text-muted-foreground mb-3">
            {{ category.count }} Rezepte
          </p>

          <!-- Description -->
          <p class="text-foreground/80 leading-relaxed mb-4">
            {{ getCategoryDescription(category.name) }}
          </p>

          <!-- Arrow Icon -->
          <div class="flex items-center text-primary font-medium group-hover:gap-3 transition-all">
            <span>Rezepte ansehen</span>
            <svg 
              class="h-5 w-5 transform group-hover:translate-x-1 transition-transform" 
              fill="none" 
              stroke="currentColor" 
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
          </div>
        </article>
      </div>

      <!-- Back to Home -->
      <div class="mt-12 text-center">
        <a 
          [routerLink]="['/']"
          class="inline-flex items-center gap-2 text-foreground hover:text-primary transition-colors font-medium"
        >
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Zurück zur Startseite
        </a>
      </div>
    </div>
  </section>
</div>
