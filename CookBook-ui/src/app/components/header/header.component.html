<header class="sticky top-0 z-50 bg-card/90 backdrop-blur-xl border-b border-border/60 transition-all duration-500">
  <div class="mx-auto px-6 md:px-10 lg:px-16">
    <div class="flex items-center h-[68px] md:h-[80px]">
      <!-- Logo -->
      <a [routerLink]="['/']" class="flex items-center gap-2.5 group shrink-0">
        <app-cookbook-logo 
          [size]="40" 
          className="h-8 w-8 md:h-9 md:w-9 transition-transform duration-500 group-hover:scale-110 group-hover:rotate-[-4deg]">
        </app-cookbook-logo>
        <span class="font-display text-xl md:text-2xl font-bold text-foreground tracking-tight">
          Cook<span class="text-primary">Book</span>
        </span>
      </a>

      <!-- Left Spacer -->
      <div class="hidden md:block flex-1"></div>

      <!-- Center Group: Search + Nav Links -->
      <div class="hidden md:flex items-center gap-2 shrink-0">
        <div *ngIf="!isRecipesPage" class="flex max-w-md w-[320px] lg:w-[400px]">
          <div 
            class="relative w-full cursor-pointer group/search"
            (click)="openSearchOverlay()"
          >
            <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-muted-foreground transition-colors group-hover/search:text-primary">search</mat-icon>
            <div class="search-input pl-12 flex items-center text-muted-foreground text-sm group-hover/search:border-primary/40 group-hover/search:shadow-soft">
              Rezepte suchen...
            </div>
          </div>
        </div>

        <nav class="flex items-center gap-1">
          <a [routerLink]="['/recipes']" class="nav-link px-3 py-2 rounded-xl hover:bg-secondary/60" [class.active]="isRecipesPage">Rezepte</a>
          <a [routerLink]="['/categories']" class="nav-link px-3 py-2 rounded-xl hover:bg-secondary/60" [class.active]="isCategoriesPage">Kategorien</a>
          <a [routerLink]="['/saved']" class="relative nav-link p-2.5 rounded-xl hover:bg-secondary/60" [class.active]="isSavedPage" aria-label="Gespeicherte Rezepte">
            <mat-icon class="text-lg">favorite_border</mat-icon>
            <ng-container *ngIf="savedCount$ | async as count">
              <span *ngIf="count > 0" class="absolute -top-0.5 -right-0.5 min-w-[17px] h-[17px] px-1 rounded-full bg-primary text-primary-foreground text-[10px] font-bold leading-[17px] text-center tabular-nums">
                {{ count > 99 ? '99+' : count }}
              </span>
            </ng-container>
          </a>
        </nav>
      </div>

      <!-- Right Spacer -->
      <div class="hidden md:block flex-1"></div>

      <!-- Right Actions - Desktop -->
      <div class="hidden md:flex items-center gap-1 shrink-0">
        <!-- Theme Toggle -->
        <button 
          (click)="toggleTheme()"
          class="p-2.5 rounded-xl hover:bg-secondary/60 transition-all duration-300 text-muted-foreground hover:text-foreground"
          [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
          title="Theme umschalten"
        >
          <mat-icon class="text-xl">{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <!-- Auth Buttons -->
        <ng-container *ngIf="!isLoggedIn">
          <a [routerLink]="['/login']">
            <button class="btn btn-cookbook ml-2 px-5 py-2 text-sm">
              Anmelden
            </button>
          </a>
        </ng-container>
        
        <ng-container *ngIf="isLoggedIn">
          <a [routerLink]="['/profile']" class="ml-2 group/avatar relative">
            <img 
              *ngIf="currentUser$ | async as user" 
              [src]="user.profilePicture || 'assets/fallbackProfilePicture.png'" 
              [alt]="user.name"
              referrerpolicy="no-referrer"
              class="w-9 h-9 rounded-full object-cover ring-2 ring-border transition-all duration-300 group-hover/avatar:ring-primary/50 group-hover/avatar:scale-105">
          </a>
          <button 
            (click)="logout()"
            class="btn btn-cookbook-outline ml-2 px-4 py-2 text-sm"
          >
            Abmelden
          </button>
        </ng-container>
      </div>

      <!-- Mobile Menu Button -->
      <button
        (click)="isMenuOpen = !isMenuOpen"
        class="md:hidden ml-auto p-2.5 rounded-xl hover:bg-secondary/60 transition-all duration-300"
        aria-label="Menü"
        [attr.aria-expanded]="isMenuOpen"
      >
        <mat-icon *ngIf="!isMenuOpen">menu</mat-icon>
        <mat-icon *ngIf="isMenuOpen">close</mat-icon>
      </button>
    </div>

    <!-- Mobile Search -->
    <div *ngIf="!isRecipesPage" class="md:hidden pb-3">
      <div class="relative cursor-pointer group/search" (click)="openSearchOverlay()">
        <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-muted-foreground">search</mat-icon>
        <div class="search-input pl-12 text-sm flex items-center text-muted-foreground">
          Rezepte suchen...
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isMenuOpen" class="md:hidden bg-card/95 backdrop-blur-xl border-t border-border/60 animate-fade-in">
    <nav class="container mx-auto py-4 flex flex-col gap-1">
      <a [routerLink]="['/recipes']" (click)="isMenuOpen = false" 
         class="py-3 px-4 rounded-xl font-medium text-foreground hover:text-primary hover:bg-secondary/60 transition-all duration-300">
        Rezepte
      </a>
      <a [routerLink]="['/categories']" (click)="isMenuOpen = false" 
         class="py-3 px-4 rounded-xl font-medium text-foreground hover:text-primary hover:bg-secondary/60 transition-all duration-300">
        Kategorien
      </a>
      <a [routerLink]="['/saved']" (click)="isMenuOpen = false" 
         class="py-3 px-4 rounded-xl font-medium text-foreground hover:text-primary hover:bg-secondary/60 transition-all duration-300 flex items-center gap-2">
        <span class="relative shrink-0">
          <mat-icon class="text-lg">favorite_border</mat-icon>
          <ng-container *ngIf="savedCount$ | async as count">
            <span *ngIf="count > 0" class="absolute -top-1 -right-1 min-w-[17px] h-[17px] px-1 rounded-full bg-primary text-primary-foreground text-[10px] font-bold leading-[17px] text-center tabular-nums">
              {{ count > 99 ? '99+' : count }}
            </span>
          </ng-container>
        </span>
        Gespeichert
      </a>
      <!-- Mobile Theme Toggle -->
      <button 
        (click)="toggleTheme()"
        class="py-3 px-4 rounded-xl font-medium text-foreground hover:text-primary hover:bg-secondary/60 transition-all duration-300 flex items-center gap-2 text-left"
        [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        {{ themeService.isDarkMode() ? 'Light Mode' : 'Dark Mode' }}
      </button>

      <div class="border-t border-border/60 my-2"></div>

      <ng-container *ngIf="!isLoggedIn">
        <a [routerLink]="['/login']" (click)="isMenuOpen = false" class="px-4">
          <button class="btn btn-cookbook w-full flex items-center justify-center gap-2">
            Anmelden
          </button>
        </a>
      </ng-container>
      
      <ng-container *ngIf="isLoggedIn">
        <a [routerLink]="['/profile']" (click)="isMenuOpen = false" 
           class="py-3 px-4 rounded-xl font-medium text-foreground hover:text-primary hover:bg-secondary/60 transition-all duration-300 flex items-center gap-3">
          <img 
            *ngIf="currentUser$ | async as user" 
            [src]="user.profilePicture || 'assets/fallbackProfilePicture.png'" 
            [alt]="user.name"
            referrerpolicy="no-referrer"
            class="w-10 h-10 rounded-full object-cover ring-2 ring-border">
          Profil
        </a>
        <div class="px-4">
          <button 
            (click)="logout(); isMenuOpen = false"
            class="btn btn-cookbook-outline w-full flex items-center justify-center gap-2"
          >
            Abmelden
          </button>
        </div>
      </ng-container>
    </nav>
  </div>
</header>

<!-- Search Overlay -->
<app-search-overlay
  *ngIf="isSearchOverlayOpen"
  [visible]="isSearchOverlayOpen"
  (closed)="closeSearchOverlay()"
></app-search-overlay>
