<div class="min-h-screen bg-background">
  <app-header></app-header>
  
  <div class="container mx-auto px-4 py-16">
    <div class="max-w-2xl mx-auto">
      <!-- User Info Section -->
      <div *ngIf="currentUser$ | async as user; else loading" class="bg-card rounded-lg shadow-lg p-8">
        <div class="text-center mb-8">
          <div class="w-24 h-24 mx-auto mb-4 flex items-center justify-center">
            <app-avatar-display 
              [avatarConfig]="user.avatar" 
              [userName]="user.name || 'User'" 
              [size]="96">
            </app-avatar-display>
          </div>
          <h1 class="font-display text-3xl font-bold text-foreground mb-2">
            {{ user.name || 'Unbekannt' }}
          </h1>
          <p class="text-muted-foreground">
            {{ user.email }}
          </p>
        </div>

        <!-- User Details -->
        <div class="space-y-4 border-t border-border pt-6">
          <div class="flex justify-between">
            <span class="text-muted-foreground">Mitglied seit:</span>
            <span class="font-medium">{{ user.joinedAt | date:'dd.MM.yyyy' }}</span>
          </div>
          <div *ngIf="user.bio" class="flex flex-col gap-2">
            <span class="text-muted-foreground">Bio:</span>
            <p class="text-foreground">{{ user.bio }}</p>
          </div>
        </div>

        <!-- Actions -->
        <div class="mt-8 flex gap-4">
          <a [routerLink]="['/edit-profile']" class="flex-1">
            <button class="btn btn-cookbook w-full">
              Profil bearbeiten
            </button>
          </a>
          <a [routerLink]="['/']" class="flex-1">
            <button class="btn btn-cookbook-outline w-full">
              Zurück zur Startseite
            </button>
          </a>
        </div>
      </div>

      <!-- Loading State -->
      <ng-template #loading>
        <div class="bg-card rounded-lg shadow-lg p-8 animate-pulse">
          <div class="w-24 h-24 mx-auto mb-4 rounded-full bg-muted"></div>
          <div class="h-8 bg-muted rounded w-1/2 mx-auto mb-2"></div>
          <div class="h-4 bg-muted rounded w-1/3 mx-auto"></div>
        </div>
      </ng-template>
    </div>
  </div>
  
  <app-footer></app-footer>
</div>
