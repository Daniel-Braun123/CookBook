<div class="min-h-screen bg-background">
  <app-header></app-header>
  
  <div class="container mx-auto px-4 py-16 md:py-20">
    <div class="max-w-2xl mx-auto">
      <!-- User Info Section -->
      <div *ngIf="currentUser$ | async as user; else loading" class="bg-card rounded-2xl shadow-card border border-border/40 p-8 md:p-10 animate-fade-in">
        <div class="text-center mb-10">
          <div class="w-28 h-28 mx-auto mb-5 flex items-center justify-center">
            <img 
              [src]="user.profilePicture || 'assets/fallbackProfilePicture.png'" 
              [alt]="user.name || 'User'" 
              referrerpolicy="no-referrer"
              class="w-28 h-28 rounded-2xl object-cover ring-4 ring-border/60 shadow-soft">
          </div>
          <h1 class="font-display text-3xl md:text-4xl font-bold text-foreground mb-2 tracking-tight">
            {{ user.name || 'Unbekannt' }}
          </h1>
          <p class="text-muted-foreground text-lg">
            {{ user.email }}
          </p>
        </div>

        <!-- User Details -->
        <div class="space-y-4 border-t border-border/60 pt-8">
          <div class="flex justify-between items-center py-2">
            <span class="text-muted-foreground">Mitglied seit:</span>
            <span class="font-semibold text-foreground">{{ user.joinedAt | date:'dd.MM.yyyy' }}</span>
          </div>
          <div *ngIf="user.bio" class="flex flex-col gap-2 py-2">
            <span class="text-muted-foreground">Bio:</span>
            <p class="text-foreground leading-relaxed">{{ user.bio }}</p>
          </div>
        </div>

        <!-- Actions -->
        <div class="mt-10 flex gap-4">
          <a [routerLink]="['/edit-profile']" class="flex-1">
            <button class="btn btn-cookbook w-full">
              Profil bearbeiten
            </button>
          </a>
          <a [routerLink]="['/']" class="flex-1">
            <button class="btn btn-cookbook-outline w-full">
              Zurück zur Startseite
            </button>
          </a>
        </div>
      </div>

      <!-- Loading State -->
      <ng-template #loading>
        <div class="bg-card rounded-2xl shadow-card border border-border/40 p-10 animate-shimmer">
          <div class="w-28 h-28 mx-auto mb-5 rounded-2xl bg-muted"></div>
          <div class="h-8 bg-muted rounded-lg w-1/2 mx-auto mb-3"></div>
          <div class="h-4 bg-muted rounded-lg w-1/3 mx-auto"></div>
        </div>
      </ng-template>
    </div>
  </div>
  
  <app-footer></app-footer>
</div>
