<div class="min-h-screen bg-background">
  <app-header></app-header>
  
  <div class="relative container mx-auto px-4 py-16 md:py-20">

    <!-- Back button -->
    <button (click)="goBack()" class="absolute top-6 left-4 inline-flex items-center gap-2 text-muted-foreground hover:text-foreground transition-all duration-300 group">
      <mat-icon class="text-base transition-transform duration-300 group-hover:-translate-x-1">arrow_back</mat-icon>
      <span class="text-sm font-medium">Zurück</span>
    </button>

    <div class="max-w-2xl mx-auto">

      <!-- User Info Section -->
      <div *ngIf="currentUser$ | async as user; else loading" class="relative bg-card rounded-2xl shadow-card border border-border/40 p-8 md:p-10 animate-fade-in">

        <!-- Color Theme Picker — top right of card -->
        <div class="absolute top-4 right-4">
          <app-color-theme-picker></app-color-theme-picker>
        </div>
        <div class="text-center mb-10">
          <div class="w-28 h-28 mx-auto mb-5 flex items-center justify-center">
            <img 
              [src]="user.profilePicture || 'assets/fallbackProfilePicture.png'" 
              [alt]="user.name || 'User'" 
              referrerpolicy="no-referrer"
              class="w-28 h-28 rounded-2xl object-cover ring-4 ring-border/60 shadow-soft">
          </div>
          <h1 class="font-display text-3xl md:text-4xl font-bold text-foreground mb-2 tracking-tight">
            {{ user.name || 'Unbekannt' }}
          </h1>
          <p class="text-muted-foreground text-lg">
            {{ user.email }}
          </p>
        </div>

        <!-- User Details -->
        <div class="space-y-4 border-t border-border/60 pt-8">
          <div class="flex justify-between items-center py-2">
            <span class="text-muted-foreground">Mitglied seit:</span>
            <span class="font-semibold text-foreground">{{ user.joinedAt | date:'dd.MM.yyyy' }}</span>
          </div>
          <div *ngIf="user.bio" class="flex flex-col gap-2 py-2">
            <span class="text-muted-foreground">Bio:</span>
            <p class="text-foreground leading-relaxed">{{ user.bio }}</p>
          </div>
        </div>

        <!-- Actions -->
        <div class="mt-10 flex flex-col gap-3">
          <div class="flex gap-3">
            <a [routerLink]="['/edit-profile']" class="flex-1">
              <button class="btn btn-cookbook w-full">
                Profil bearbeiten
              </button>
            </a>
            <a [routerLink]="['/create-recipe']" class="flex-1">
              <button class="btn btn-cookbook-outline w-full">
                Rezept erstellen
              </button>
            </a>
          </div>
          <a [routerLink]="['/my-recipes']" class="w-full">
            <button class="btn btn-cookbook-outline w-full flex items-center justify-center gap-2">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
              </svg>
              Meine Rezepte
            </button>
          </a>
        </div>
      </div>

      <!-- Loading State -->
      <ng-template #loading>
        <div class="bg-card rounded-2xl shadow-card border border-border/40 p-10 animate-shimmer">
          <div class="w-28 h-28 mx-auto mb-5 rounded-2xl bg-muted"></div>
          <div class="h-8 bg-muted rounded-lg w-1/2 mx-auto mb-3"></div>
          <div class="h-4 bg-muted rounded-lg w-1/3 mx-auto"></div>
        </div>
      </ng-template>
    </div>
  </div>
  
  <app-footer></app-footer>
</div>
