<div class="min-h-screen bg-background">
  <app-header></app-header>

  <div class="container mx-auto px-4 py-10 md:py-14 max-w-4xl">
    <!-- Header -->
    <div class="mb-10 animate-fade-in">
      <a [routerLink]="['/']" class="inline-flex items-center gap-2 text-muted-foreground hover:text-foreground transition-all duration-300 mb-5 group">
        <mat-icon class="text-base transition-transform duration-300 group-hover:-translate-x-1">arrow_back</mat-icon>
        <span class="text-sm font-medium">Zurück</span>
      </a>
      <h1 class="font-display text-3xl md:text-4xl font-bold text-foreground mb-3 tracking-tight">
        Neues Rezept erstellen
      </h1>
      <p class="text-muted-foreground leading-relaxed">
        Teile dein Lieblingsrezept mit der Community
      </p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-8">
      <!-- Basic Information -->
      <div class="p-7 rounded-2xl bg-card border border-border/60 shadow-soft">
        <h2 class="font-display text-xl font-bold text-foreground mb-7 tracking-tight">Grundinformationen</h2>
        
        <div class="space-y-5">
          <!-- Title -->
          <div>
            <label class="label block mb-2">
              Titel <span class="text-destructive">*</span>
            </label>
            <input
              type="text"
              [(ngModel)]="title"
              name="title"
              required
              class="input"
              placeholder="z.B. Spaghetti Carbonara"
            />
          </div>

          <!-- Description -->
          <div>
            <label class="label block mb-2">
              Beschreibung <span class="text-destructive">*</span>
            </label>
            <textarea
              [(ngModel)]="description"
              name="description"
              required
              rows="4"
              class="input"
              placeholder="Beschreibe dein Rezept..."
            ></textarea>
          </div>

          <!-- Category & Difficulty -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="label block mb-2">
                Kategorie <span class="text-destructive">*</span>
              </label>
              <select
                [(ngModel)]="category"
                name="category"
                required
                class="input"
              >
                <option value="" disabled>Kategorie wählen</option>
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
              </select>
            </div>

            <div>
              <label class="label block mb-2">
                Schwierigkeitsgrad <span class="text-destructive">*</span>
              </label>
              <select
                [(ngModel)]="difficulty"
                name="difficulty"
                required
                class="input"
              >
                <option value="EINFACH">Einfach</option>
                <option value="MITTEL">Mittel</option>
                <option value="SCHWER">Schwer</option>
              </select>
            </div>
          </div>

          <!-- Time & Servings -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div>
              <label class="label block mb-2">
                Vorbereitungszeit (Min)
              </label>
              <input
                type="number"
                [(ngModel)]="prepTime"
                name="prepTime"
                min="0"
                class="input"
              />
            </div>

            <div>
              <label class="label block mb-2">
                Kochzeit (Min)
              </label>
              <input
                type="number"
                [(ngModel)]="cookTime"
                name="cookTime"
                min="0"
                class="input"
              />
            </div>

            <div>
              <label class="label block mb-2">
                Portionen
              </label>
              <input
                type="number"
                [(ngModel)]="servings"
                name="servings"
                min="1"
                class="input"
              />
            </div>
          </div>

          <!-- Tags -->
          <div>
            <label class="label block mb-2">
              Tags
            </label>
            <div class="flex gap-2.5 mb-3">
              <input
                type="text"
                [(ngModel)]="currentTag"
                name="currentTag"
                (keydown.enter)="$event.preventDefault(); addTag()"
                class="input flex-1 !w-auto"
                placeholder="Tag hinzufügen..."
              />
              <button
                type="button"
                (click)="addTag()"
                class="px-6 py-3 rounded-xl bg-secondary hover:bg-primary hover:text-primary-foreground transition-all duration-300 font-semibold"
              >
                Hinzufügen
              </button>
            </div>
            <div class="flex flex-wrap gap-2">
              <span
                *ngFor="let tag of tags"
                class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-full bg-primary/8 text-primary text-sm font-semibold transition-all duration-200 hover:bg-primary/15"
              >
                {{ tag }}
                <button type="button" (click)="removeTag(tag)" class="hover:text-destructive transition-colors duration-200">
                  <mat-icon class="text-sm">close</mat-icon>
                </button>
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Ingredients -->
      <div class="p-7 rounded-2xl bg-card border border-border/60 shadow-soft">
        <div class="flex items-center justify-between mb-7">
          <h2 class="font-display text-xl font-bold text-foreground tracking-tight">Zutaten</h2>
          <button
            type="button"
            (click)="addIngredient()"
            class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-primary text-primary-foreground hover:bg-primary/90 transition-all duration-300 font-semibold text-sm"
          >
            <mat-icon class="text-base">add</mat-icon>
            Zutat hinzufügen
          </button>
        </div>

        <div class="space-y-3">
          <div *ngFor="let ingredient of ingredients; let i = index" class="flex gap-3 items-start">
            <input
              type="number"
              [(ngModel)]="ingredient.amount"
              [name]="'ingredient-amount-' + i"
              placeholder="Menge"
              class="input !w-24"
            />
            <input
              type="text"
              [(ngModel)]="ingredient.unit"
              [name]="'ingredient-unit-' + i"
              placeholder="Einheit"
              class="input !w-24"
            />
            <input
              type="text"
              [(ngModel)]="ingredient.name"
              [name]="'ingredient-name-' + i"
              placeholder="Zutat"
              class="input flex-1 !w-auto"
            />
            <button
              type="button"
              (click)="removeIngredient(i)"
              class="p-2.5 rounded-xl text-destructive hover:bg-destructive/8 transition-all duration-300"
              [disabled]="ingredients.length === 1"
            >
              <mat-icon class="text-base">delete</mat-icon>
            </button>
          </div>
        </div>
      </div>

      <!-- Steps -->
      <div class="p-7 rounded-2xl bg-card border border-border/60 shadow-soft">
        <div class="flex items-center justify-between mb-7">
          <h2 class="font-display text-xl font-bold text-foreground tracking-tight">Zubereitungsschritte</h2>
          <button
            type="button"
            (click)="addStep()"
            class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-primary text-primary-foreground hover:bg-primary/90 transition-all duration-300 font-semibold text-sm"
          >
            <mat-icon class="text-base">add</mat-icon>
            Schritt hinzufügen
          </button>
        </div>

        <div class="space-y-4">
          <div *ngFor="let step of steps; let i = index" class="flex gap-3 items-start">
            <div class="flex-shrink-0 w-9 h-9 rounded-xl bg-primary text-primary-foreground flex items-center justify-center font-bold text-sm mt-2">
              {{ i + 1 }}
            </div>
            <div class="flex-1 space-y-2.5">
              <textarea
                [(ngModel)]="step.instruction"
                [name]="'step-instruction-' + i"
                placeholder="Beschreibe diesen Zubereitungsschritt..."
                rows="3"
                class="input"
              ></textarea>
              <input
                type="number"
                [(ngModel)]="step.duration"
                [name]="'step-duration-' + i"
                placeholder="Dauer (Min) - optional"
                min="0"
                class="input !w-40"
              />
            </div>
            <button
              type="button"
              (click)="removeStep(i)"
              class="p-2.5 rounded-xl text-destructive hover:bg-destructive/8 transition-all duration-300 mt-2"
              [disabled]="steps.length === 1"
            >
              <mat-icon class="text-base">delete</mat-icon>
            </button>
          </div>
        </div>
      </div>

      <!-- Nutrition -->
      <div class="p-7 rounded-2xl bg-card border border-border/60 shadow-soft">
        <h2 class="font-display text-xl font-bold text-foreground mb-7 tracking-tight">Nährwerte (pro Portion)</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
          <div>
            <label class="label block mb-2">
              Kalorien (kcal)
            </label>
            <input
              type="number"
              [(ngModel)]="nutrition.calories"
              name="calories"
              min="0"
              class="input"
            />
          </div>

          <div>
            <label class="label block mb-2">
              Protein (g)
            </label>
            <input
              type="number"
              [(ngModel)]="nutrition.protein"
              name="protein"
              min="0"
              class="input"
            />
          </div>

          <div>
            <label class="label block mb-2">
              Kohlenhydrate (g)
            </label>
            <input
              type="number"
              [(ngModel)]="nutrition.carbs"
              name="carbs"
              min="0"
              class="input"
            />
          </div>

          <div>
            <label class="label block mb-2">
              Fett (g)
            </label>
            <input
              type="number"
              [(ngModel)]="nutrition.fat"
              name="fat"
              min="0"
              class="input"
            />
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="flex gap-4">
        <button
          type="submit"
          class="btn btn-cookbook flex-1 md:flex-none md:px-14 py-3.5"
        >
          Rezept veröffentlichen
        </button>
        <a [routerLink]="['/']" class="btn bg-secondary hover:bg-secondary/70 text-foreground flex-1 md:flex-none md:px-14 py-3.5 text-center rounded-xl transition-all duration-300 font-semibold">
          Abbrechen
        </a>
      </div>
    </form>
  </div>

  <app-footer></app-footer>
</div>
