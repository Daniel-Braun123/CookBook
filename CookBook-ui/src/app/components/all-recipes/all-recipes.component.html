<div class="min-h-screen bg-background">
  <app-header></app-header>

  <!-- Filter Bar -->
  <section class="sticky top-[68px] md:top-[80px] z-40 bg-card/95 backdrop-blur-xl border-b border-border/60 shadow-soft">
    <div class="container mx-auto py-4">
      <div class="flex flex-col md:flex-row gap-3 items-stretch md:items-center">

        <!-- Search -->
        <div class="relative flex-1 min-w-0">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 h-4 w-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input
            type="text"
            [(ngModel)]="searchQuery"
            (ngModelChange)="applyFilters()"
            placeholder="Rezepte durchsuchen..."
            class="input pl-10 w-full"
          />
        </div>

        <!-- Category Filter -->
        <select
          [(ngModel)]="selectedCategory"
          (ngModelChange)="applyFilters()"
          class="input md:w-48"
        >
          <option value="">Alle Kategorien</option>
          <option *ngFor="let cat of categories" [value]="cat.name">{{ cat.name }}</option>
        </select>

        <!-- Difficulty Filter -->
        <select
          [(ngModel)]="selectedDifficulty"
          (ngModelChange)="applyFilters()"
          class="input md:w-40"
        >
          <option value="">Alle Schwierigkeiten</option>
          <option value="EINFACH">Einfach</option>
          <option value="MITTEL">Mittel</option>
          <option value="SCHWER">Schwer</option>
        </select>

        <!-- Sort -->
        <select
          [(ngModel)]="sortBy"
          (ngModelChange)="applyFilters()"
          class="input md:w-44"
        >
          <option value="rating">Beste Bewertung</option>
          <option value="newest">Neueste zuerst</option>
          <option value="time">Kürzeste Kochzeit</option>
        </select>

        <!-- Clear Filters -->
        <button
          *ngIf="hasActiveFilters"
          (click)="clearFilters()"
          class="btn btn-cookbook-outline px-4 py-2.5 text-sm whitespace-nowrap shrink-0"
        >
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
          Filter zurücksetzen
        </button>
      </div>
    </div>
  </section>

  <!-- Results -->
  <section class="py-10 md:py-14">
    <div class="container mx-auto">

      <!-- Loading shimmer -->
      <div *ngIf="isLoading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="rounded-2xl overflow-hidden border border-border bg-card">
          <div class="aspect-[4/3] bg-muted animate-shimmer"></div>
          <div class="p-5 space-y-3">
            <div class="h-3 bg-muted rounded-full w-1/3 animate-shimmer"></div>
            <div class="h-5 bg-muted rounded-lg w-3/4 animate-shimmer" style="animation-delay:0.1s"></div>
            <div class="h-3 bg-muted rounded-full w-full animate-shimmer" style="animation-delay:0.2s"></div>
          </div>
        </div>
      </div>

      <!-- Results count + active filter tags -->
      <div *ngIf="!isLoading" class="flex flex-wrap items-center gap-3 mb-8">
        <span class="text-sm text-muted-foreground font-medium">
          {{ filteredRecipes.length }} {{ filteredRecipes.length === 1 ? 'Rezept' : 'Rezepte' }} gefunden
        </span>
        <span *ngIf="selectedCategory" class="inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1 bg-primary/10 text-primary rounded-full">
          {{ selectedCategory }}
          <button (click)="selectedCategory = ''; applyFilters()">
            <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </span>
        <span *ngIf="selectedDifficulty" class="inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1 bg-accent/10 text-accent rounded-full">
          {{ selectedDifficulty === 'EINFACH' ? 'Einfach' : selectedDifficulty === 'MITTEL' ? 'Mittel' : 'Schwer' }}
          <button (click)="selectedDifficulty = ''; applyFilters()">
            <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </span>
      </div>

      <!-- Recipe grid -->
      <div *ngIf="!isLoading && filteredRecipes.length > 0"
           class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start">
        <div
          *ngFor="let recipe of filteredRecipes; trackBy: trackByRecipeId; let i = index"
          class="animate-fade-in"
          [style.animation-delay]="(i * 40) + 'ms'"
        >
          <app-recipe-card [recipe]="recipe"></app-recipe-card>
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="!isLoading && filteredRecipes.length === 0" class="flex flex-col items-center justify-center py-24 text-center">
        <div class="w-20 h-20 rounded-2xl bg-secondary flex items-center justify-center mb-6">
          <svg class="h-9 w-9 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <h3 class="font-display text-xl font-bold text-foreground mb-2">Keine Rezepte gefunden</h3>
        <p class="text-muted-foreground mb-6 max-w-sm">Versuche andere Filter oder setze sie zurück.</p>
        <button (click)="clearFilters()" class="btn btn-cookbook px-6 py-2.5">
          Filter zurücksetzen
        </button>
      </div>

    </div>
  </section>

  <app-footer></app-footer>
</div>
