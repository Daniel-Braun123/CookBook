<a [routerLink]="['/recipe', recipe.id]" class="block group" [ngClass]="className">
  <article class="recipe-card h-full flex flex-col">
    <!-- Image Container -->
    <div class="relative aspect-[4/3] overflow-hidden">
      <div 
        class="absolute inset-0 bg-muted animate-pulse"
        [class.hidden]="imageLoaded"
      ></div>
      <img
        [src]="'assets/' + recipe.image"
        [alt]="recipe.title"
        [class.opacity-0]="!imageLoaded"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
        (load)="imageLoaded = true"
      />
      
      <!-- Overlay on Hover -->
      <div class="absolute inset-0 bg-foreground/0 group-hover:bg-foreground/10 transition-colors duration-300"></div>
      
      <!-- Save Button -->
      <button
        (click)="toggleSaved($event)"
        class="absolute top-3 right-3 z-10 w-10 h-10 rounded-full flex items-center justify-center transition-all duration-200 hover:scale-110"
        [ngClass]="{
          'text-primary bg-card/90': isSaved,
          'text-foreground bg-card/90 backdrop-blur-sm': !isSaved
        }"
      >
        <mat-icon class="text-xl">{{ isSaved ? 'favorite' : 'favorite_border' }}</mat-icon>
      </button>

      <!-- Tags -->
      <div *ngIf="recipe.tags.length > 0" class="absolute bottom-3 left-3 flex flex-wrap gap-2">
        <span
          *ngFor="let tag of recipe.tags.slice(0, 2)"
          class="px-2 py-1 text-xs font-medium bg-card/90 backdrop-blur-sm rounded-full text-foreground"
        >
          {{ tag }}
        </span>
      </div>
    </div>

    <!-- Content -->
    <div class="p-4 flex flex-col flex-grow">
      <!-- Rating -->
      <div class="flex items-center gap-1 mb-2">
        <div class="flex items-center">
          <svg
            *ngFor="let star of [1, 2, 3, 4, 5]"
            class="h-4 w-4"
            [ngClass]="{
              'rating-star': star <= Math.round(recipe.rating),
              'text-muted-foreground/30': star > Math.round(recipe.rating)
            }"
            [attr.fill]="star <= Math.round(recipe.rating) ? 'currentColor' : 'none'"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              stroke-width="2" 
              d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" 
            />
          </svg>
        </div>
        <span class="text-xs text-muted-foreground">
          {{ recipe.rating }} ({{ recipe.reviewCount }})
        </span>
      </div>

      <!-- Category -->
      <span class="text-xs font-medium text-primary mb-2">{{ recipe.category.name }}</span>

      <!-- Title -->
      <h3 class="font-display text-lg font-semibold text-foreground mb-2 line-clamp-2 group-hover:text-primary transition-colors">
        {{ recipe.title }}
      </h3>

      <!-- Description -->
      <p class="text-sm text-muted-foreground mb-4 line-clamp-2 flex-grow">
        {{ recipe.description }}
      </p>

      <!-- Footer -->
      <div class="flex items-center justify-between pt-4 border-t border-border mt-auto">
        <div class="flex items-center gap-4">
          <!-- Prep Time -->
          <div class="flex items-center gap-1 text-xs text-muted-foreground">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>{{ getTotalTime() }} Min</span>
          </div>

          <!-- Difficulty -->
          <span 
            [ngClass]="{
              'px-2 py-1 rounded-full text-xs font-medium': true,
              'bg-cookbook-green/10 text-cookbook-green': recipe.difficulty === 'EINFACH',
              'bg-cookbook-orange/10 text-cookbook-orange': recipe.difficulty === 'MITTEL',
              'bg-destructive/10 text-destructive': recipe.difficulty === 'SCHWER'
            }"
          >
            {{ recipe.difficulty }}
          </span>
        </div>

        <!-- Author Avatar -->
        <div class="flex items-center gap-2">
          <div class="relative group/avatar">
            <app-avatar-display
              [avatarConfig]="recipe.author.avatar"
              [userName]="recipe.author.name"
              [size]="24">
            </app-avatar-display>
            <!-- Tooltip -->
            <div class="absolute bottom-full right-0 mb-2 px-2 py-1 bg-foreground text-card text-xs rounded whitespace-nowrap opacity-0 group-hover/avatar:opacity-100 transition-opacity duration-200 pointer-events-none z-20">
              {{ recipe.author.name }}
              <div class="absolute top-full right-2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-transparent border-t-foreground"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </article>
</a>
