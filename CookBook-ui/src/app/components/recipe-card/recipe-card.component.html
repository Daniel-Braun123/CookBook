<a [routerLink]="['/recipe', recipe.id]" class="block group" [ngClass]="className">
  <article class="recipe-card h-full flex flex-col">
    <!-- Image Container -->
    <div class="relative aspect-[4/3] overflow-hidden rounded-t-2xl">
      <div 
        class="absolute inset-0 bg-muted animate-shimmer"
        [class.hidden]="imageLoaded"
      ></div>
      <img
        [src]="'assets/' + recipe.image"
        [alt]="recipe.title"
        [class.opacity-0]="!imageLoaded"
        class="w-full h-full object-cover transition-all duration-700 ease-out group-hover:scale-105"
        (load)="imageLoaded = true"
      />
      
      <!-- Overlay on Hover -->
      <div class="absolute inset-0 bg-gradient-to-t from-foreground/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
      
      <!-- Save Button -->
      <button
        (click)="toggleSaved($event)"
        class="absolute top-3 right-3 z-10 w-9 h-9 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 backdrop-blur-md"
        [ngClass]="{
          'text-primary bg-card/90 shadow-soft': isSaved,
          'text-foreground/70 bg-card/80 hover:text-primary': !isSaved
        }"
      >
        <mat-icon class="text-xl">{{ isSaved ? 'favorite' : 'favorite_border' }}</mat-icon>
      </button>

      <!-- Tags -->
      <div *ngIf="recipe.tags.length > 0" class="absolute bottom-3 left-3 flex flex-wrap gap-1.5">
        <span
          *ngFor="let tag of recipe.tags.slice(0, 2)"
          class="px-2.5 py-1 text-[11px] font-semibold bg-card/90 backdrop-blur-md rounded-full text-foreground/80 tracking-wide"
        >
          {{ tag }}
        </span>
      </div>
    </div>

    <!-- Content -->
    <div class="p-5 flex flex-col flex-grow">
      <!-- Rating & Category row -->
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-semibold text-primary uppercase tracking-wider">{{ recipe.category.name }}</span>
        <div class="flex items-center gap-1">
          <div class="flex items-center">
            <svg
              *ngFor="let star of [1, 2, 3, 4, 5]"
              class="h-3.5 w-3.5"
              [ngClass]="{
                'rating-star': star <= Math.round(recipe.rating),
                'text-muted-foreground/20': star > Math.round(recipe.rating)
              }"
              [attr.fill]="star <= Math.round(recipe.rating) ? 'currentColor' : 'none'"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path 
                stroke-linecap="round" 
                stroke-linejoin="round" 
                stroke-width="2" 
                d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" 
              />
            </svg>
          </div>
          <span class="text-[11px] text-muted-foreground ml-0.5">
            {{ recipe.rating }}
          </span>
        </div>
      </div>

      <!-- Title -->
      <h3 class="font-display text-lg font-bold text-foreground mb-2 line-clamp-2 group-hover:text-primary transition-colors duration-300 tracking-tight leading-snug">
        {{ recipe.title }}
      </h3>

      <!-- Description -->
      <p class="text-sm text-muted-foreground mb-4 line-clamp-2 flex-grow leading-relaxed">
        {{ recipe.description }}
      </p>

      <!-- Footer -->
      <div class="flex items-center justify-between pt-4 border-t border-border/60 mt-auto">
        <div class="flex items-center gap-3">
          <!-- Prep Time -->
          <div class="flex items-center gap-1.5 text-xs text-muted-foreground">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>{{ getTotalTime() }} Min</span>
          </div>

          <!-- Difficulty -->
          <span 
            [ngClass]="{
              'px-2.5 py-1 rounded-full text-[11px] font-semibold tracking-wide': true,
              'bg-accent/10 text-accent': recipe.difficulty === 'EINFACH',
              'bg-cookbook-amber/10 text-cookbook-amber': recipe.difficulty === 'MITTEL',
              'bg-destructive/10 text-destructive': recipe.difficulty === 'SCHWER'
            }"
          >
            {{ recipe.difficulty }}
          </span>
        </div>

        <!-- Author Profile Picture -->
        <div class="flex items-center gap-2">
          <div class="relative group/avatar">
            <img
              [src]="recipe.author.profilePicture || 'assets/fallbackProfilePicture.png'"
              [alt]="recipe.author.name"
              referrerpolicy="no-referrer"
              class="w-7 h-7 rounded-full object-cover ring-2 ring-border transition-all duration-300 group-hover/avatar:ring-primary/40">
            <!-- Tooltip -->
            <div class="absolute bottom-full right-0 mb-2 px-2.5 py-1.5 bg-foreground text-card text-xs rounded-lg whitespace-nowrap opacity-0 group-hover/avatar:opacity-100 transition-all duration-200 pointer-events-none z-20 shadow-overlay">
              {{ recipe.author.name }}
              <div class="absolute top-full right-2 w-0 h-0 border-l-4 border-r-4 border-t-4 border-transparent border-t-foreground"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </article>
</a>
